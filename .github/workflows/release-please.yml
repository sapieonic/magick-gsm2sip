name: release-please

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # NOTE: this step opens/updates the release PR using the default
      # GITHUB_TOKEN. GitHub's anti-recursion rule means that PR's own push
      # will NOT trigger ci.yml automatically, so it will show no status
      # checks — review the diff (a version.txt/CHANGELOG.md bump) and,
      # before merging, manually re-run ci.yml against that branch (or
      # push an empty commit to it) to get a green build. To make CI trigger
      # automatically instead, pass a personal access token or GitHub App
      # token here via the `token:` input.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Runs only when release-please actually cut a release (i.e. a Release PR
  # was just merged), and attaches an installable APK to it. The app has no
  # signingConfig, so this is an UNSIGNED release build — fine for sideloading
  # by testers, not for Play Store distribution.
  build-release-apk:
    name: Build & attach release APK
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Attach APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            app/build/outputs/apk/release/*.apk \
            --repo "${{ github.repository }}" \
            --clobber
